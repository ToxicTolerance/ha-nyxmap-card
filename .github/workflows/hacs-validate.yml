name: HACS Validate

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate-hacs:
    if: github.repository == 'ToxicTolerance/ha-nyxmap-card'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin
