name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # A tag cut from a commit that never passed CI (or that regressed after it)
  # must not ship to HACS users unverified.
  gate:
    uses: ./.github/workflows/test.yml

  release:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Extract this version's changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v marker="## [$version]" '
            /^## \[/ {
              if (found) exit
              if (index($0, marker) == 1) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/nyxmap-card.js"
          bodyFile: "release-notes.md"
          generateReleaseNotes: true
